<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>粒子星璇（26s 无缝循环）- p5.js</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        color: #cfd8ff;
      }
      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
      }
      canvas {
        display: block;
        box-shadow: 0 18px 80px rgba(0, 0, 0, 0.6);
      }
      .hud {
        position: fixed;
        left: 12px;
        bottom: 10px;
        font-size: 12px;
        opacity: 0.65;
        user-select: none;
        pointer-events: none;
      }
      .hud kbd {
        padding: 2px 6px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-bottom-color: rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        margin: 0 4px;
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="stage"></div>
    <div class="hud">
      <span id="status">正在初始化手势…</span> · <kbd>Space</kbd> 暂停/播放 · <kbd>S</kbd> 保存当前帧
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <!-- MediaPipe Hands（摄像头手部捕捉） -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.min.js"></script>
    <!-- MediaPipe Pose（上半身/人体姿态捕捉） -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.min.js"></script>
    <script src="./sketch.js"></script>
  </body>
</html>
